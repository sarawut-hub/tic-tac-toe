services:
  # Backend Service
  - type: web
    name: tic-tac-toe-backend
    runtime: python
    region: singapore # Optional: Asia region
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tic-tac-toe-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: "*" # Allow all origins for simplicity, or specify frontend URL

databases:
  # PostgreSQL Database
  - name: tic-tac-toe-db
    databaseName: tictactoe
    user: tictactoe_user
    plan: free # Use free tier

